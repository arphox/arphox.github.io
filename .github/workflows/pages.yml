name: Build and deploy Jekyll site to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@main

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      # Generate the downloadable CV PDF by printing the just-built /cv/ page with
      # headless Chrome. The PDF lands in the built site (_site) and ships with the
      # deploy artifact — it is never committed to the repo, so it can't drift from cv.md.
      - name: Generate CV PDF
        run: |
          set -euo pipefail
          # Resolve a Chromium-family browser (ubuntu-latest ships google-chrome,
          # but don't hard-code the name — fail loudly with a clear message if absent).
          CHROME="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium || true)"
          if [ -z "$CHROME" ]; then
            echo "::error::No Chrome/Chromium found on PATH; cannot generate the CV PDF." >&2
            exit 1
          fi
          "$CHROME" --version
          # Serve the built site so root-absolute asset URLs (/assets/main.css, …)
          # resolve. Use python3 (preinstalled) — not `ruby -run -e httpd`, whose
          # WEBrick was dropped from Ruby's stdlib in 3.0 and isn't on PATH here.
          python3 -m http.server 4000 --bind 127.0.0.1 --directory _site &>/dev/null &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          # Wait for the server to answer on /cv/; fail loudly if it never does
          # (otherwise Chrome would print an error page into the PDF).
          READY=0
          for i in $(seq 1 40); do
            if curl -sSf -o /dev/null "http://127.0.0.1:4000/cv/"; then READY=1; break; fi
            sleep 0.5
          done
          if [ "$READY" -ne 1 ]; then
            echo "::error::Local server did not come up on port 4000." >&2
            exit 1
          fi
          "$CHROME" \
            --headless=new \
            --disable-gpu \
            --no-sandbox \
            --no-first-run \
            --no-proxy-server \
            --user-data-dir="$(mktemp -d)" \
            --no-pdf-header-footer \
            --print-to-pdf="_site/assets/cv.pdf" \
            "http://127.0.0.1:4000/cv/"
          # Validate: a non-empty, real PDF whose extracted text is actually the
          # CV (not a blank/error page) — guards against silently shipping a
          # structurally-valid-but-wrong PDF.
          test -s _site/assets/cv.pdf
          head -c 5 _site/assets/cv.pdf | grep -q '%PDF-'
          sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils
          pdftotext _site/assets/cv.pdf - | grep -q 'quality-oriented'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@main

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@main
